name: Build macOS App

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller numpy scipy PyQt6 pyqtgraph "soundfile>=0.12"

      - name: Run self test
        working-directory: app
        run: |
          python dialogue_edit_repair_app.py --self-test

      - name: Build macOS app
        working-directory: app
        run: |
          pyinstaller --noconfirm --windowed --name DialogueEditRepair \
            --hidden-import dialogue_edit_repair_mvp \
            --collect-all soundfile \
            dialogue_edit_repair_app.py

      - name: Zip app bundle
        run: |
          mkdir -p release
          ditto -c -k --sequesterRsrc --keepParent \
            "app/dist/DialogueEditRepair.app" \
            "release/DialogueEditRepair_mac.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DialogueEditRepair-mac
          path: release/DialogueEditRepair_mac.zip
